<!DOCTYPE html>

<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seats of the States</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #9CA3AF;
    color: #c8d8e8;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 40px;
    overflow-x: hidden;
  }
  header { padding: clamp(12px, 3vw, 26px) clamp(12px, 3vw, 24px) 6px; text-align: center; width: 100%; }
  .eyebrow { font-size: clamp(8px, 1.5vw, 9px); letter-spacing: 0.35em; color: #b45309; text-transform: uppercase; margin-bottom: 7px; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(16px, 3vw, 30px); letter-spacing: -0.04em; color: #ffffff; }
  .subtitle { margin-top: 5px; font-size: clamp(8px, 1.5vw, 10px); color: #3a5070; letter-spacing: 0.1em; }

/* ── Color by toolbar ── */
#color-toolbar {
display: flex;
align-items: center;
flex-wrap: wrap;
gap: 8px;
width: min(calc(100vw - 24px), 900px);
margin-top: 12px;
padding: 8px 14px;
background: #0c1420;
border: 1px solid #1a2d42;
border-radius: 10px;
}
#color-toolbar .toolbar-label {
font-size: 8px;
letter-spacing: 0.18em;
text-transform: uppercase;
color: #2d4a60;
margin-right: 4px;
white-space: nowrap;
}
.theme-btn {
display: flex;
align-items: center;
gap: 6px;
padding: 5px 11px;
background: #0f1e2e;
border: 1px solid #1e3550;
border-radius: 6px;
color: #4a7090;
font-family: ‘DM Mono’, monospace;
font-size: clamp(7px, 1.2vw, 9px);
letter-spacing: 0.1em;
text-transform: uppercase;
cursor: pointer;
transition: border-color 0.2s, color 0.2s, background 0.2s;
white-space: nowrap;
}
.theme-btn:hover { border-color: #2d4a70; color: #c8d8e8; }
.theme-btn.active { border-color: #f59e0b; color: #f59e0b; background: #1a1200; }
.theme-btn .swatch-row { display: flex; gap: 3px; }
.theme-btn .swatch { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

#map-svg { display: block; width: 100%; max-width: 900px; height: auto; margin: 4px auto 0; touch-action: manipulation; }
.state-label { font-family: ‘DM Mono’, monospace; font-size: 11px; text-anchor: middle; pointer-events: none; user-select: none; transition: opacity 0.4s; }
.dot { cursor: pointer; touch-action: manipulation; }
#tooltip {
position: fixed; background: #0c1824; border: 1px solid #1e3550;
border-top: 2px solid #f59e0b; padding: 6px 12px; border-radius: 6px;
pointer-events: none; font-size: clamp(9px, 1.5vw, 11px); color: #c8d8e8; z-index: 999;
opacity: 0; transition: opacity 0.1s; white-space: nowrap;
transform: translateX(-50%); max-width: calc(100vw - 24px);
}
#tooltip strong { color: #f59e0b; margin-right: 5px; }
#tooltip .tt-name { color: #e0eaf5; margin-right: 4px; }
#tooltip span { color: #4a7090; font-size: 10px; margin-left: 5px; }
#tooltip::after { content: ‘’; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1e3550; }
#tooltip::before { content: ‘’; position: absolute; top: calc(100% - 1px); left: 50%; transform: translateX(-50%); z-index: 1; border: 5px solid transparent; border-top-color: #0c1824; }
.stats { display: flex; align-items: stretch; flex-wrap: wrap; background: #0c1420; border: 1px solid #1a2d42; border-radius: 10px; overflow: hidden; margin-top: 10px; width: min(calc(100vw - 24px), 900px); }
.stat { padding: clamp(6px, 1.5vw, 9px) clamp(10px, 2vw, 18px); text-align: center; border-right: 1px solid #1a2d42; flex: 1; min-width: 60px; }
.stat:last-child { border-right: none; }
.stat-val { font-family: ‘Syne’, sans-serif; font-weight: 800; font-size: clamp(14px, 2.5vw, 18px); color: #f59e0b; line-height: 1; }
.stat-lbl { font-size: clamp(7px, 1.2vw, 8px); letter-spacing: 0.12em; text-transform: uppercase; color: #2d4a60; margin-top: 3px; }
.clr-btn { padding: clamp(6px, 1.5vw, 9px) clamp(8px, 1.5vw, 15px); background: none; border: none; color: #2d4a60; font-family: ‘DM Mono’, monospace; font-size: clamp(7px, 1.2vw, 9px); letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: color 0.2s; white-space: nowrap; }
.clr-btn:hover { color: #f59e0b; }
.rnd-btn { padding: clamp(6px, 1.5vw, 9px) clamp(8px, 1.5vw, 15px); background: none; border: none; border-left: 1px solid #1a2d42; color: #2d4a60; font-family: ‘DM Mono’, monospace; font-size: clamp(7px, 1.2vw, 9px); letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: color 0.2s; white-space: nowrap; }
.rnd-btn:hover { color: #f59e0b; }
.rnd-btn.active { color: #f59e0b; }
.legend { display: flex; flex-wrap: wrap; gap: clamp(8px, 2vw, 16px); align-items: center; margin-top: 9px; font-size: clamp(7px, 1.2vw, 9px); letter-spacing: 0.1em; text-transform: uppercase; color: #2d4a60; padding: 0 clamp(6px, 1.5vw, 12px); }
.ld { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; flex-shrink: 0; }

/* Legend for color-by themes */
#theme-legend {
display: none;
flex-wrap: wrap;
gap: clamp(6px, 1.5vw, 12px);
align-items: center;
margin-top: 8px;
font-size: clamp(7px, 1.2vw, 9px);
letter-spacing: 0.1em;
text-transform: uppercase;
color: #2d4a60;
padding: 7px clamp(6px, 1.5vw, 12px);
width: min(calc(100vw - 24px), 900px);
background: #0c1420;
border: 1px solid #1a2d42;
border-radius: 10px;
}
#theme-legend.visible { display: flex; }
.legend-label { color: #2d4a60; margin-right: 4px; white-space: nowrap; }
.legend-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-item-label { color: #7a9ab8; }

#dot-detail-panel { width: min(700px, calc(100vw - 24px)); margin-top: 18px; background: #0c1420; border: 1px solid #1a2d42; border-radius: 10px; overflow: hidden; display: none; }
#dot-detail-panel.visible { display: block; }
.detail-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #1a2d42; flex-wrap: wrap; }
.detail-dot-swatch { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid #7dd3fc; }
.detail-dot-name { font-family: ‘Syne’, sans-serif; font-weight: 800; font-size: clamp(12px, 2vw, 14px); color: #f0f6ff; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 80px; }
.detail-state-badge { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #f59e0b; background: #1a2d0e; border: 1px solid #3a5010; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
.detail-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.detail-field { display: flex; flex-direction: column; gap: 4px; }
.detail-field-label { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: #2d4a60; }
.detail-field-value { background: #080f18; border: 1px solid #1a2d42; border-radius: 6px; color: #c8d8e8; font-family: ‘DM Mono’, monospace; font-size: 11px; padding: 7px 10px; line-height: 1.5; min-height: 32px; }
.detail-field-value.multiline { min-height: 72px; white-space: pre-wrap; }
.detail-field-value.empty { color: #1e3550; font-style: italic; }
.detail-fields-row { display: flex; gap: 10px; flex-wrap: wrap; }
.detail-fields-row .detail-field { flex: 1; min-width: 120px; }
#selection-panel { width: min(700px, calc(100vw - 24px)); margin-top: 18px; background: #0c1420; border: 1px solid #1a2d42; border-radius: 10px; overflow: hidden; display: none; }
#selection-panel.visible { display: block; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid #1a2d42; font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: #2d4a60; flex-wrap: wrap; gap: 4px; }
.panel-header span { color: #f59e0b; font-family: ‘Syne’, sans-serif; font-weight: 800; font-size: 13px; letter-spacing: 0; }
#selection-list { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 14px; max-height: 300px; overflow-y: auto; }
#selection-list::-webkit-scrollbar { width: 4px; }
#selection-list::-webkit-scrollbar-thumb { background: #1e3550; border-radius: 2px; }
.sel-chip { background: #0f1e2e; border: 1px solid #1e3550; border-radius: 8px; padding: 8px 10px; min-width: 130px; max-width: 200px; flex: 1; }
.sel-chip.full { border-color: #92400e; background: #130e04; }
.chip-header { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
.chip-abbr { color: #f59e0b; font-family: ‘Syne’, sans-serif; font-weight: 800; font-size: 12px; }
.chip-count { color: #2d4060; font-size: 9px; margin-left: auto; }
.chip-dots { display: grid; grid-template-columns: repeat(3, 7px); gap: 3px; margin-bottom: 7px; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; }
.chip-dot.empty { background: #182534; border: 1px solid #243c56; }
.chip-dot.named { box-shadow: 0 0 0 1.5px #7dd3fc; }
.chip-dot-list { display: flex; flex-direction: column; gap: 3px; border-top: 1px solid #1a2d42; padding-top: 6px; }
.chip-dot-row { display: flex; align-items: center; gap: 5px; font-size: 9px; padding: 2px 3px; border-radius: 3px; cursor: pointer; transition: background 0.15s; }
.chip-dot-row:hover { background: #1a2d42; }
.chip-dot-row.active-detail { background: #1a2d42; outline: 1px solid #f59e0b; outline-offset: -1px; }
.dot-pill { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
.dot-pill.named { box-shadow: 0 0 0 1.5px #7dd3fc; }
.dot-label { color: #c8d8e8; }
.dot-info { font-size: 8px; color: #4a6880; margin-left: 11px; margin-top: 1px; line-height: 1.3; }
.dot-info-label { color: #2d5070; margin-right: 3px; text-transform: uppercase; font-size: 7px; letter-spacing: 0.08em; }
@media (max-width: 480px) { .subtitle { display: none; } .stats { border-radius: 8px; } .sel-chip { min-width: 110px; } }

</head>

<header>
  <div class="eyebrow">Interactive Cartogram · State Courts of Last Resort</div>
  <h1>Seats of the States</h1>
  <p class="subtitle">Click a dot to select · Hover to see name · Click randomize to combine all</p>
</header>

<div id="color-toolbar">
  <span class="toolbar-label">Color by…</span>
</div>

<div id="theme-legend"></div>

<svg id="map-svg"></svg>

<div class="stats">

  <div class="stat"><div class="stat-val" id="total-dots">0</div><div class="stat-lbl">Total Justices*</div></div>
  <button class="clr-btn" onclick="clearAll()">Clear</button>
  <button class="rnd-btn" id="rnd-btn" onclick="toggleRandomize()">Randomize</button>
</div>
<div class="legend">
  <span><span class="ld" style="background:#182534;border:1px solid #243c56;box-sizing:border-box"></span>Vacant</span>
  <span><span class="ld" style="background:#f59e0b"></span>Selected</span>
  <span><span class="ld" style="background:#ff0000"></span>GOP</span>
  <span><span class="ld" style="background:#0000ff"></span>DEM</span>
  <span><span class="ld" style="background:#FFFF00;border:1px solid #b8b800;box-sizing:border-box"></span>Independent/Indeterminant</span>
</div>
<div id="dot-detail-panel">
  <div class="detail-header">
    <div class="detail-dot-swatch" id="detail-swatch"></div>
    <div class="detail-dot-name" id="detail-dot-name">—</div>
    <div class="detail-state-badge" id="detail-state-badge">—</div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>
<div id="selection-panel">
  <div class="panel-header">
    <div>Selected Justices*</div>
    <div><span id="panel-dot-count">0</span> Justices*</div>
  </div>
  <div id="selection-list"></div>
</div>
<div id="tooltip"></div>

  },
];

// No always-on individual colors needed — use the theme sections above
const INDIVIDUAL_DOT_COLORS = {};

const DEFAULT_DOT_COLOR = "#f59e0b";
let activeThemeIndex = 0;

function getThemeColor(abbr, i) {
  if (activeThemeIndex < 0) return null;
  const theme = COLOR_THEMES[activeThemeIndex];
  const key = `${abbr}-${i}`;
  if (theme.dots   && theme.dots[key])    return theme.dots[key];
  if (theme.states && theme.states[abbr]) return theme.states[abbr];
  return null;
}

function getDotColor(abbr, i) {
  // Theme colors take priority, then individual dot colors, then default
  return getThemeColor(abbr, i)
    || INDIVIDUAL_DOT_COLORS[`${abbr}-${i}`]
    || DEFAULT_DOT_COLOR;
}

function getFullRingColor(abbr, i) {
  const base = getDotColor(abbr, i);
  return base === DEFAULT_DOT_COLOR ? "#fde68a" : "#ffffff";
}

const toolbar = document.getElementById("color-toolbar");
const themeLegendEl = document.getElementById("theme-legend");

function renderThemeLegend(themeIdx) {
  themeLegendEl.innerHTML = "";
  if (themeIdx < 0) { themeLegendEl.classList.remove("visible"); return; }
  const theme = COLOR_THEMES[themeIdx];
  const entries = theme.legend || [];
  if (entries.length === 0) { themeLegendEl.classList.remove("visible"); return; }
  const lbl = document.createElement("span");
  lbl.className = "legend-label";
  lbl.textContent = theme.name + ":";
  themeLegendEl.appendChild(lbl);
  entries.forEach(entry => {
    const item = document.createElement("div");
    item.className = "legend-item";
    const dot = document.createElement("div");
    dot.className = "legend-dot";
    dot.style.background = entry.color;
    const label = document.createElement("span");
    label.className = "legend-item-label";
    label.textContent = entry.label;
    item.appendChild(dot);
    item.appendChild(label);
    themeLegendEl.appendChild(item);
  });
  themeLegendEl.classList.add("visible");
}

COLOR_THEMES.forEach((theme, idx) => {
  const btn = document.createElement("button");
  btn.className = "theme-btn";
  btn.dataset.themeIdx = idx;
  btn.appendChild(document.createTextNode(theme.name));
  btn.addEventListener("click", () => {
    if (activeThemeIndex === idx) {
      activeThemeIndex = -1;
      btn.classList.remove("active");
    } else {
      activeThemeIndex = idx;
      document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }
    renderThemeLegend(activeThemeIndex);
    STATES.forEach(s => { for (let i = 0; i < s.dots; i++) renderDot(s.abbr, i); });
  });
  toolbar.appendChild(btn);
  if(idx === 0) btn.classList.add('active');
});

const DOT_NAME_COLOR_DEFAULT = "#c8d8e8";
const DOT_NAME_COLOR_STATES  = {};
const DOT_NAME_COLOR_DOTS    = {};

function getDotNameColor(abbr, i) {
  const key = `${abbr}-${i}`;
  if (DOT_NAME_COLOR_DOTS[key])    return DOT_NAME_COLOR_DOTS[key];
  if (DOT_NAME_COLOR_STATES[abbr]) return DOT_NAME_COLOR_STATES[abbr];
  return DOT_NAME_COLOR_DEFAULT;
}

function getDotName(abbr, i) {
  return (DOT_NAMES[abbr] && DOT_NAMES[abbr][i]) ? DOT_NAMES[abbr][i] : `${abbr} ${i+1}`;
}

const dotSelected = new Map();
STATES.forEach(s => { for (let i = 0; i < s.dots; i++) dotSelected.set(`${s.abbr}-${i}`, false); });

const CELL=72, DOT_R=9.375, DOT_GAP=21.75, PAD_X=28, PAD_Y=24;
const maxCol=Math.max(...STATES.map(s=>s.col));
const maxRow=Math.max(...STATES.map(s=>s.row));
const SVG_W=(maxCol+1)*CELL+PAD_X*2;
const SVG_H=(maxRow+1)*CELL+PAD_Y*2;

const svg=document.getElementById("map-svg");
svg.setAttribute("viewBox",`0 0 ${SVG_W} ${SVG_H}`);
svg.setAttribute("preserveAspectRatio","xMidYMid meet");

function getOffsets(count){
  const G=DOT_GAP;
  if(count===9){const pts=[];for(let r=0;r<3;r++)for(let c=0;c<3;c++)pts.push({dx:(c-1)*G,dy:(r-1)*G});return pts;}
  if(count===5)return[{dx:0,dy:-G},{dx:-G,dy:0},{dx:0,dy:0},{dx:G,dy:0},{dx:0,dy:G}];
  return[];
}
function getOffsets7(){
  const G=DOT_GAP;
  return[{dx:-G,dy:-G*0.9},{dx:0,dy:-G*0.9},{dx:G,dy:-G*0.9},{dx:-G/2,dy:0},{dx:G/2,dy:0},{dx:-G,dy:G*0.9},{dx:0,dy:G*0.9}];
}
function getDotOffsets(count){if(count===9)return getOffsets(9);if(count===7)return getOffsets7();if(count===5)return getOffsets(5);return getOffsets(9);}

const tooltip=document.getElementById("tooltip");
const dotEls=new Map(), labelEls=new Map(), dotOrigPos=new Map();
let isRandomized=false, randomPositions=new Map();

function generateBallPositions(){
  const totalDots=STATES.reduce((s,st)=>s+st.dots,0);
  const ballCX=SVG_W/2,ballCY=SVG_H/2,positions=[],goldenAngle=Math.PI*(3-Math.sqrt(5)),scale=Math.sqrt(totalDots)*DOT_R*0.78;
  for(let k=0;k<totalDots;k++){const r=scale*Math.sqrt(k/(totalDots-1||1)),theta=k*goldenAngle;positions.push({x:ballCX+r*Math.cos(theta),y:ballCY+r*Math.sin(theta)});}
  for(let i=positions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[positions[i],positions[j]]=[positions[j],positions[i]];}
  return positions;
}

function animateDots(toRandomized){
  const positions=toRandomized?generateBallPositions():null;
  const allKeys=[];
  STATES.forEach(state=>{for(let i=0;i<state.dots;i++)allKeys.push({abbr:state.abbr,i});});
  allKeys.forEach(({abbr,i},dotIndex)=>{
    const key=`${abbr}-${i}`,el=dotEls.get(key);if(!el)return;
    const dg=el.parentNode;
    const orig=dotOrigPos.get(key),delay=dotIndex*3;
    let targetX,targetY;
    if(toRandomized){const pos=positions[dotIndex];randomPositions.set(key,pos);targetX=pos.x;targetY=pos.y;}
    else{targetX=orig.x;targetY=orig.y;}
    const t=dg.getAttribute("transform").match(/translate\(([^,]+),([^)]+)\)/);
    const startX=parseFloat(t[1]),startY=parseFloat(t[2]),duration=600;
    let startTime=null;
    function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
    setTimeout(()=>{
      function step(ts){if(!startTime)startTime=ts;const elapsed=ts-startTime,progress=Math.min(elapsed/duration,1),eased=easeInOut(progress);const nx=startX+(targetX-startX)*eased,ny=startY+(targetY-startY)*eased;dg.setAttribute("transform",`translate(${nx},${ny})`);if(progress<1)requestAnimationFrame(step);}
      requestAnimationFrame(step);
    },delay);
  });
  labelEls.forEach(lbl=>{lbl.style.opacity=toRandomized?"0":"1";});
}

window.toggleRandomize=function(){
  isRandomized=!isRandomized;
  const btn=document.getElementById("rnd-btn");
  btn.textContent=isRandomized?"Restore":"Randomize";
  btn.classList.toggle("active",isRandomized);
  animateDots(isRandomized);pinnedTooltip=null;tooltip.style.opacity=0;
};

let activeDetailKey=null;

function renderDetailPanel(abbr,dotIdx){
  const key=`${abbr}-${dotIdx}`,panel=document.getElementById("dot-detail-panel"),body=document.getElementById("detail-body"),data=DOT_DATA[key]||{};
  document.getElementById("detail-dot-name").textContent=getDotName(abbr,dotIdx);
  document.getElementById("detail-swatch").style.background=getDotColor(abbr,dotIdx);
  document.getElementById("detail-swatch").style.borderColor=dotSelected.get(key)?"#7dd3fc":"#243c56";
  document.getElementById("detail-state-badge").textContent=abbr;
  body.innerHTML="";
  const row=document.createElement("div");row.className="detail-fields-row";
  const makeField=(label,value)=>{
    const wrap=document.createElement("div");wrap.className="detail-field";
    const lbl=document.createElement("div");lbl.className="detail-field-label";lbl.textContent=label;
    const val=document.createElement("div");val.className="detail-field-value"+(!value?" empty":"");val.textContent=value||"—";
    wrap.appendChild(lbl);wrap.appendChild(val);return wrap;
  };
  row.appendChild(makeField("Start Date",data.field1||""));row.appendChild(makeField("End Date or Mandatory Retirement",data.field2||""));body.appendChild(row);
  const nw=document.createElement("div");nw.className="detail-field";
  const nl=document.createElement("div");nl.className="detail-field-label";nl.textContent="Notes";
  const nv=document.createElement("div");nv.className="detail-field-value multiline"+(!data.notes?" empty":"");nv.textContent=data.notes||"—";
  nw.appendChild(nl);nw.appendChild(nv);body.appendChild(nw);
  panel.classList.add("visible");
  activeDetailKey=key;
  document.querySelectorAll(".chip-dot-row").forEach(el=>{el.classList.toggle("active-detail",el.dataset.dotKey===key);});
}

function hideDetailPanel(){
  document.getElementById("dot-detail-panel").classList.remove("visible");
  activeDetailKey=null;
  document.querySelectorAll(".chip-dot-row").forEach(el=>el.classList.remove("active-detail"));
}

let pinnedTooltip=null;
const totalPossible=STATES.reduce((s,st)=>s+st.dots,0);
document.getElementById("total-dots").textContent=totalPossible;

function svgToScreen(svgX,svgY){
  try{const rect=svg.getBoundingClientRect();return{x:rect.left+svgX*(rect.width/SVG_W),y:rect.top+svgY*(rect.height/SVG_H)};}catch(e){return{x:svgX,y:svgY};}
}

function buildTooltipHTML(abbr,stateName,dotIdx){
  let html=`<strong>${abbr}</strong>`;
  if(dotIdx!==undefined){
    html+=`<span class="tt-name" style="color:${getDotNameColor(abbr,dotIdx)}">${getDotName(abbr,dotIdx)}</span>`;
    html+=`<span>${dotSelected.get(`${abbr}-${dotIdx}`)?"selected":"click to select"}</span>`;
  }else{
    html+=stateName;
    html+=`<span>${countSel(abbr)}/${getStateDots(abbr)} selected · click to toggle all</span>`;
  }
  return html;
}

function positionTooltip(dotSvgX,dotSvgY){
  const screen=svgToScreen(dotSvgX,dotSvgY),scaleY=svg.getBoundingClientRect().height/SVG_H;
  requestAnimationFrame(()=>{
    const th=tooltip.offsetHeight,tw=tooltip.offsetWidth;
    let left=Math.max(tw/2+8,Math.min(screen.x,window.innerWidth-tw/2-8));
    tooltip.style.left=left+"px";tooltip.style.top=(screen.y-DOT_R*scaleY-th-10)+"px";
  });
}

function positionTooltipNearEl(el){
  const rect=el.getBoundingClientRect();
  requestAnimationFrame(()=>{
    const th=tooltip.offsetHeight,tw=tooltip.offsetWidth;
    let left=Math.max(tw/2+8,Math.min(rect.left+rect.width/2,window.innerWidth-tw/2-8));
    tooltip.style.left=left+"px";tooltip.style.top=(rect.top-th-10)+"px";
  });
}

function showTooltip(abbr,stateName,dotSvgX,dotSvgY,dotIdx){
  if(pinnedTooltip&&!(pinnedTooltip.abbr===abbr&&pinnedTooltip.dotIdx===dotIdx))return;
  tooltip.innerHTML=buildTooltipHTML(abbr,stateName,dotIdx);
  tooltip.style.opacity=1;positionTooltip(dotSvgX,dotSvgY);
}

function pinTooltip(abbr,stateName,dotSvgX,dotSvgY,dotIdx){
  pinnedTooltip={abbr,dotIdx,svgX:dotSvgX,svgY:dotSvgY,stateName};
  tooltip.innerHTML=buildTooltipHTML(abbr,stateName,dotIdx);
  tooltip.style.opacity=1;positionTooltip(dotSvgX,dotSvgY);
}

function hideTooltip(){if(pinnedTooltip)return;tooltip.style.opacity=0;}

const ibox=document.createElementNS("http://www.w3.org/2000/svg","rect");
ibox.setAttribute("x",PAD_X-10);ibox.setAttribute("y",PAD_Y+6.5*CELL);
ibox.setAttribute("width",CELL*2+20);ibox.setAttribute("height",CELL*2+10);
ibox.setAttribute("fill","none");ibox.setAttribute("stroke","#0f1e2e");
ibox.setAttribute("stroke-width","1");ibox.setAttribute("rx","4");ibox.setAttribute("stroke-dasharray","4,3");
svg.appendChild(ibox);

svg.addEventListener("click",()=>{pinnedTooltip=null;tooltip.style.opacity=0;hideDetailPanel();});

STATES.forEach(state=>{
  const cx=PAD_X+state.col*CELL+CELL/2,cy=PAD_Y+state.row*CELL+CELL/2;
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  getDotOffsets(state.dots).forEach(({dx,dy},i)=>{
    const key=`${state.abbr}-${i}`,dotX=cx+dx,dotY=cy+dy;
    const dg=document.createElementNS("http://www.w3.org/2000/svg","g");
    dg.setAttribute("transform",`translate(${dotX},${dotY})`);
    const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",0);c.setAttribute("cy",0);c.setAttribute("r",DOT_R);c.setAttribute("class","dot");
    c.setAttribute("fill","#182534");c.setAttribute("stroke","#1e3048");c.setAttribute("stroke-width","0.5");
    dotEls.set(key,c);dotOrigPos.set(key,{x:dotX,y:dotY});
    c.addEventListener("mouseenter",()=>{const t=dg.getAttribute("transform").match(/translate\(([^,]+),([^)]+)\)/);showTooltip(state.abbr,state.name,parseFloat(t[1]),parseFloat(t[2]),i);});
    c.addEventListener("mouseleave",hideTooltip);
    c.addEventListener("click",e=>{
      e.stopPropagation();
      dotSelected.set(key,!dotSelected.get(key));
      renderDot(state.abbr,i);renderLabel(state.abbr);updateStats();
      const t=dg.getAttribute("transform").match(/translate\(([^,]+),([^)]+)\)/);
      pinTooltip(state.abbr,state.name,parseFloat(t[1]),parseFloat(t[2]),i);
      renderDetailPanel(state.abbr,i);
    });
    dg.appendChild(c);
    if(i===0){
      const starPts=(r1,r2,pts)=>{let a=[];for(let p=0;p<pts*2;p++){const ang=(p*Math.PI/pts)-Math.PI/2,r=p%2===0?r1:r2;a.push(`${r*Math.cos(ang)},${r*Math.sin(ang)}`);}return a.join(" ");};
      const star=document.createElementNS("http://www.w3.org/2000/svg","polygon");
      star.setAttribute("points",starPts(6.5,2.8,5));
      star.setAttribute("fill","#000000");
      star.setAttribute("pointer-events","none");
      dg.appendChild(star);
    }
    g.appendChild(dg);
  });
  const lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
  lbl.setAttribute("x",cx);lbl.setAttribute("y",cy+DOT_GAP+DOT_R+9);
  lbl.setAttribute("class","state-label");lbl.setAttribute("fill","#2d4a62");
  lbl.style.cursor="pointer";lbl.textContent=state.abbr;
  labelEls.set(state.abbr,lbl);
  lbl.addEventListener("click",()=>toggleState(state.abbr));
  lbl.addEventListener("mouseenter",()=>showTooltip(state.abbr,state.name,cx,cy,undefined));
  lbl.addEventListener("mouseleave",hideTooltip);
  g.appendChild(lbl);svg.appendChild(g);
});

function getStateDots(abbr){const s=STATES.find(s=>s.abbr===abbr);return s?s.dots:9;}
function countSel(abbr){let n=0;const t=getStateDots(abbr);for(let i=0;i<t;i++)if(dotSelected.get(`${abbr}-${i}`))n++;return n;}

function renderDot(abbr,i){
  const key=`${abbr}-${i}`,el=dotEls.get(key),on=dotSelected.get(key);
  const full=countSel(abbr)===getStateDots(abbr);
  const themeColor = activeThemeIndex >= 0 ? getThemeColor(abbr, i) : null;
  const individualColor = INDIVIDUAL_DOT_COLORS[key] || null;
  const activeColor = themeColor || individualColor;

  if(activeColor){
    el.setAttribute("fill", activeColor);
    if(on&&full){el.setAttribute("stroke","#ffffff");el.setAttribute("stroke-width","2");}
    else if(on){el.setAttribute("stroke","#ffffff");el.setAttribute("stroke-width","1.5");}
    else{el.setAttribute("stroke","#1e3048");el.setAttribute("stroke-width","0.5");}
  } else {
    el.setAttribute("fill", on ? "#f59e0b" : "#182534");
    if(on&&full){el.setAttribute("stroke","#fde68a");el.setAttribute("stroke-width","1.2");}
    else if(on){el.setAttribute("stroke","#7dd3fc");el.setAttribute("stroke-width","1.5");}
    else{el.setAttribute("stroke","#1e3048");el.setAttribute("stroke-width","0.5");}
  }
}

function renderLabel(abbr){
  const el=labelEls.get(abbr);if(!el)return;
  const n=countSel(abbr),t=getStateDots(abbr);
  el.setAttribute("fill",n===t?"#92400e":n>0?"#b45309":"#2d4a62");
}

function toggleState(abbr){
  const total=getStateDots(abbr),on=countSel(abbr)<total;
  for(let i=0;i<total;i++){dotSelected.set(`${abbr}-${i}`,on);renderDot(abbr,i);}
  renderLabel(abbr);updateStats();
}

function updateStats(){
  let dots=0,totalPoss=0;
  STATES.forEach(s=>{const n=countSel(s.abbr);dots+=n;totalPoss+=s.dots;});
  document.getElementById("dot-count").textContent=dots;
  document.getElementById("total-dots").textContent=totalPoss;
  renderSelectionPanel(dots);
}

function renderSelectionPanel(totalDots){
  const panel=document.getElementById("selection-panel"),list=document.getElementById("selection-list"),cntEl=document.getElementById("panel-dot-count");
  const active=STATES.filter(s=>countSel(s.abbr)>0);
  if(active.length===0){panel.classList.remove("visible");return;}
  panel.classList.add("visible");cntEl.textContent=totalDots;list.innerHTML="";
  active.forEach(state=>{
    const n=countSel(state.abbr),full=n===9;
    const chip=document.createElement("div");chip.className="sel-chip"+(full?" full":"");
    const header=document.createElement("div");header.className="chip-header";
    const stateDotCount=getStateDots(state.abbr);
    const dotsGrid=document.createElement("div");dotsGrid.className="chip-dots";
    dotsGrid.style.gridTemplateColumns=`repeat(${stateDotCount===9?3:stateDotCount===7?4:3},7px)`;
    for(let i=0;i<stateDotCount;i++){
      const on=dotSelected.get(`${state.abbr}-${i}`);
      const d=document.createElement("div");d.className="chip-dot"+(!on?" empty":" named");
      if(on){d.style.background=getDotColor(state.abbr,i);d.title=getDotName(state.abbr,i);}
      dotsGrid.appendChild(d);
    }
    const abbrEl=document.createElement("div");abbrEl.className="chip-abbr";abbrEl.textContent=state.abbr;
    const cntEl2=document.createElement("div");cntEl2.className="chip-count";cntEl2.textContent=`${n}/${stateDotCount}`;
    header.appendChild(dotsGrid);header.appendChild(abbrEl);header.appendChild(cntEl2);chip.appendChild(header);
    const selectedIdxs=[];
    for(let i=0;i<stateDotCount;i++)if(dotSelected.get(`${state.abbr}-${i}`))selectedIdxs.push(i);
    if(selectedIdxs.length>0){
      const dlist=document.createElement("div");dlist.className="chip-dot-list";
      selectedIdxs.forEach(i=>{
        const dotKey=`${state.abbr}-${i}`;
        const row=document.createElement("div");row.className="chip-dot-row"+(activeDetailKey===dotKey?" active-detail":"");row.dataset.dotKey=dotKey;
        const pill=document.createElement("div");pill.className="dot-pill named";pill.style.background=getDotColor(state.abbr,i);
        const txt=document.createElement("span");txt.className="dot-label";txt.style.color=getDotNameColor(state.abbr,i);txt.textContent=getDotName(state.abbr,i);
        row.appendChild(pill);row.appendChild(txt);
        row.addEventListener("click",e=>{e.stopPropagation();renderDetailPanel(state.abbr,i);document.getElementById("dot-detail-panel").scrollIntoView({behavior:"smooth",block:"nearest"});});
        row.addEventListener("mouseenter",()=>{tooltip.innerHTML=buildTooltipHTML(state.abbr,state.name,i);tooltip.style.opacity=1;positionTooltipNearEl(row);});
        row.addEventListener("mouseleave",()=>{tooltip.style.opacity=0;});
        dlist.appendChild(row);
        const info=getDotInfo(state.abbr,i);
        if(info&&info.text){
          const infoEl=document.createElement("div");infoEl.className="dot-info";
          if(info.color)infoEl.style.color=info.color;
          if(info.label){const lEl=document.createElement("span");lEl.className="dot-info-label";lEl.textContent=info.label;infoEl.appendChild(lEl);}
          infoEl.appendChild(document.createTextNode(info.text));dlist.appendChild(infoEl);
        }
      });
      chip.appendChild(dlist);
    }
    list.appendChild(chip);
  });
}

STATES.forEach(s => { for (let i = 0; i < s.dots; i++) renderDot(s.abbr, i); });

window.clearAll=function(){
  STATES.forEach(s=>{for(let i=0;i<s.dots;i++){dotSelected.set(`${s.abbr}-${i}`,false);renderDot(s.abbr,i);}renderLabel(s.abbr);});
  pinnedTooltip=null;tooltip.style.opacity=0;hideDetailPanel();updateStats();
};
